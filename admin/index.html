<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>India Fitness | Admin</title>
    <!-- Use the standard decap-cms distribution -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  </head>
  <body>
    <script>
      (function() {
        // We MUST set this BEFORE the script is fully parsed/executing if possible, 
        // but here we use it to control the manual boot.
        window.CMS_MANUAL_INIT = true;

        async function initCMS() {
          try {
            const response = await fetch('/admin/config.yml');
            const yamlText = await response.text();
            const config = jsyaml.load(yamlText);

            // Dynamically point to our Vercel API for login
            if (config.backend) {
              config.backend.base_url = window.location.origin + '/api';
            }

            // Initialize with our modified config
            window.CMS.init({ config });
            
            console.log("CMS Initialized with base_url:", config.backend.base_url);
          } catch (err) {
            console.error("CMS Manual Init Failed:", err);
            document.body.innerHTML = `<div style="text-align:center;padding:50px;font-family:sans-serif;">
              <h2 style="color:red;">Admin Panel Error</h2>
              <p>${err.message}</p>
            </div>`;
          }
        }

        // Start the process
        if (window.location.protocol !== 'file:') {
          initCMS();
        } else {
          document.body.innerHTML = "<h1>Run on a web server, not file://</h1>";
        }
      })();
    </script>
  </body>
</html>
