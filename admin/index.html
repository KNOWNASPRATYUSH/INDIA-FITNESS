<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>India Fitness | Admin</title>
    <script>
      // Crucial: Tell Decap NOT to auto-run
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- Scripts at the bottom for reliability -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      // Force Identity redirection for those using Netlify Identity
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script>
      (function() {
        window.CMS_MANUAL_INIT = true;

        async function init() {
          if (!window.CMS || !window.jsyaml) {
            console.log("Waiting for libraries...");
            setTimeout(init, 100);
            return;
          }

          try {
            const res = await fetch('/admin/config.yml');
            const yamlText = await res.text();
            const config = jsyaml.load(yamlText);

            if (config.backend) {
              config.backend.base_url = window.location.origin + '/api';
              config.backend.name = 'github';
              config.backend.repo = 'cartnovaco-netizen/INDIA-FITNESS';
            }

            // Start CMS
            window.CMS.init({ config });
            
            // Helpful debug for browser console
            console.log("India Fitness Admin Ready.");
          } catch (e) {
            console.error("CMS Init Error:", e);
          }
        }

        // Run as soon as possible
        init();
      })();
    </script>
  </body>
</html>
